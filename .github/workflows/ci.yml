name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install g++ (C++17)
        run: sudo apt-get install -y g++

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Cargo tests (unit + integration)
        run: cargo test

      - name: Smoke-test examples
        run: |
          for f in examples/*.df; do
            [ "$(basename "$f")" = "tests.df" ] && continue
            grep -q '^func main():' "$f" || continue
            echo "--- $f ---"
            ./target/release/deific emit "$f" > /dev/null
          done
